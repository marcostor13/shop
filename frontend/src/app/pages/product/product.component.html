<app-nav />

@if (product(); as p) {
  <main class="max-w-[1440px] mx-auto px-[80px] max-md:px-5 py-16">
    <div class="grid grid-cols-12 gap-6 max-md:grid-cols-1">

      <!-- Image -->
      <div class="col-span-7 max-md:col-span-1">
        <div class="relative aspect-[3/4] overflow-hidden bg-[var(--color-surface-container-low)]">
          <img [ngSrc]="p.images[0]" fill [alt]="p.name" class="object-cover" priority />
        </div>
      </div>

      <!-- Info -->
      <div class="col-span-5 max-md:col-span-1 flex flex-col pt-4">
        <p class="font-sans text-xs font-semibold tracking-[0.1em] uppercase text-[var(--color-secondary)] mb-2">
          {{ p.category }}
        </p>
        <h1 class="font-serif text-[40px] leading-[1.2] mb-4">{{ p.name }}</h1>
        <p class="font-sans text-lg leading-relaxed text-[var(--color-secondary)] mb-6">
          {{ p.description }}
        </p>
        <p class="font-sans text-xl mb-8">${{ p.price.toFixed(2) }}</p>

        <button (click)="addToCart()"
                class="bg-[var(--color-primary)] text-[var(--color-on-primary)]
                       font-sans text-sm font-medium tracking-[0.05em] uppercase
                       px-8 py-4 hover:bg-[var(--color-secondary)]
                       transition-colors duration-300 w-full">
          Add to Bag
        </button>

        <!-- Accordions -->
        <div class="mt-10 border-t border-[var(--color-glass-border)]">
          @for (section of ['The Science', 'Ingredients', 'How to Use']; track section) {
            <div class="border-b border-[var(--color-glass-border)]">
              <button (click)="toggleAccordion(section)"
                      [attr.aria-expanded]="activeAccordion() === section"
                      class="w-full flex justify-between items-center py-5">
                <span class="font-sans text-sm font-medium tracking-[0.05em] uppercase">{{ section }}</span>
                <span class="material-symbols-outlined transition-transform duration-300"
                      [class.rotate-180]="activeAccordion() === section">expand_more</span>
              </button>
              <div class="overflow-hidden transition-all duration-[400ms] ease-[cubic-bezier(0.2,0,0,1)]"
                   [style.max-height]="activeAccordion() === section ? '400px' : '0'">
                <p class="pb-5 font-sans text-base leading-relaxed text-[var(--color-secondary)]">
                  Content for {{ section }}.
                </p>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </main>
}
